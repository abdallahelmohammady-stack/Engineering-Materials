// IndexedDB
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,DB_VERSION);r.onerror=()=>rej(r.error);r.onsuccess=()=>res(r.result);r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(STORE_NAME))db.createObjectStore(STORE_NAME,{keyPath:'id'});};});}
async function dbGetAll(gid){const db=await openDB();return new Promise((res,rej)=>{const rq=db.transaction(STORE_NAME,'readonly').objectStore(STORE_NAME).getAll();rq.onsuccess=()=>res((rq.result||[]).filter(i=>i.galleryId===gid).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)));rq.onerror=()=>rej(rq.error);});}
async function dbAdd(img){const db=await openDB();return new Promise((r,j)=>{const tx=db.transaction(STORE_NAME,'readwrite');tx.objectStore(STORE_NAME).add(img);tx.oncomplete=()=>r(img);tx.onerror=()=>j(tx.error);});}
async function dbUpdate(img){const db=await openDB();return new Promise((r,j)=>{const tx=db.transaction(STORE_NAME,'readwrite');tx.objectStore(STORE_NAME).put(img);tx.oncomplete=()=>r(img);tx.onerror=()=>j(tx.error);});}
async function dbDel(id){const db=await openDB();return new Promise((r,j)=>{const tx=db.transaction(STORE_NAME,'readwrite');tx.objectStore(STORE_NAME).delete(id);tx.oncomplete=()=>r();tx.onerror=()=>j(tx.error);});}
async function dbDelByGallery(gid){const imgs=await dbGetAll(gid);return Promise.all(imgs.map(i=>dbDel(i.id)));}
async function dbGetAllExport(){const db=await openDB();return new Promise((r,j)=>{const rq=db.transaction(STORE_NAME,'readonly').objectStore(STORE_NAME).getAll();rq.onsuccess=()=>r(rq.result||[]);rq.onerror=()=>j(rq.error);});}

function ToastContainer({toasts,removeToast}){return(<div className="fixed top-4 left-4 z-[99999] flex flex-col gap-2" style={{maxWidth:'320px'}}>{toasts.map(t=>(<div key={t.id} className={`toast-in flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl text-white text-sm font-medium cursor-pointer ${t.type==='success'?'bg-gradient-to-r from-emerald-500 to-teal-600':t.type==='error'?'bg-gradient-to-r from-red-500 to-rose-600':'bg-gradient-to-r from-indigo-500 to-purple-600'}`} onClick={()=>removeToast(t.id)}><i className={`fa ${t.type==='success'?'fa-check-circle':t.type==='error'?'fa-times-circle':'fa-info-circle'} text-lg`}></i><span>{t.message}</span></div>))}</div>);}

// Modal
function Modal({isOpen,onClose,title,children,size='md'}){
useEffect(()=>{if(isOpen)document.body.style.overflow='hidden';else document.body.style.overflow='';return()=>{document.body.style.overflow=''};},[isOpen]);
if(!isOpen)return null;
const sc=size==='sm'?'max-w-md':size==='lg'?'max-w-2xl':size==='xl'?'max-w-4xl':'max-w-lg';
return(<div style={{position:'fixed',top:0,left:0,right:0,bottom:0,zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}} onClick={onClose}><div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.5)',backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)'}}></div><div className={`${sc} bg-white dark:bg-gray-900 shadow-2xl border border-gray-200 dark:border-gray-700 modal-animate`} style={{position:'relative',zIndex:10,width:'100%',maxHeight:'85vh',overflowY:'auto',borderRadius:'1rem'}} onClick={e=>e.stopPropagation()}><div className="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-gray-700 bg-gradient-to-r from-indigo-500/10 to-purple-500/10"><h3 className="text-lg font-bold text-gray-800 dark:text-white">{title}</h3><button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400"><i className="fa fa-times"></i></button></div><div className="p-6">{children}</div></div></div>);}

function ConfirmModal({isOpen,onClose,onConfirm,title,message,confirmText='حذف'}){return(<Modal isOpen={isOpen} onClose={onClose} title={title} size="sm"><p className="text-gray-600 dark:text-gray-300 mb-6 leading-relaxed">{message}</p><div className="flex gap-3 justify-end"><button onClick={onClose} className="px-4 py-2 rounded-xl border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 font-medium">إلغاء</button><button onClick={()=>{onConfirm();onClose();}} className="px-4 py-2 rounded-xl text-white font-medium bg-red-500 hover:bg-red-600">{confirmText}</button></div></Modal>);}

function InputModal({isOpen,onClose,onConfirm,title,label,placeholder,initialValue=''}){
const[val,setVal]=useState(initialValue);
useEffect(()=>{if(isOpen)setVal(initialValue);},[isOpen,initialValue]);
const hc=()=>{if(val.trim()){onConfirm(val.trim());onClose();}};
return(<Modal isOpen={isOpen} onClose={onClose} title={title} size="sm"><label className="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">{label}</label><input value={val} onChange={e=>setVal(e.target.value)} placeholder={placeholder} onKeyDown={e=>{if(e.key==='Enter')hc();}} autoFocus className="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none"/><div className="flex gap-3 justify-end mt-4"><button onClick={onClose} className="px-4 py-2 rounded-xl border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 font-medium">إلغاء</button><button onClick={hc} className="px-4 py-2 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-medium hover:opacity-90">تأكيد</button></div></Modal>);}

function SectionItem({section,sectionIndex,totalSections,onUpdate,showToast}){

</div>
</div>
{!collapsed&&<div className="px-2 py-2 bg-white dark:bg-gray-900">{(section.links||[]).length===0?<p className="text-center text-sm text-gray-400 py-3">لا توجد روابط</p>:(section.links||[]).map((link,idx)=><LinkItem key={link.id} link={link} index={idx} totalLinks={section.links.length} onEdit={l=>{setEditLinkModal(l);setEditLinkName(l.name);setEditLinkUrl(l.url);}} onDelete={id=>setDeleteLinkId(id)} onMoveUp={()=>handleMoveLink(link.id,'up')} onMoveDown={()=>handleMoveLink(link.id,'down')}/>)}</div>}

</div>);}

const handleMoveImage=async(imgId,dir)=>{const idx=images.findIndex(i=>i.id===imgId);if(idx===-1)return;const ni=dir==='up'?idx-1:idx+1;if(ni<0||ni>=images.length)return;const newImgs=[...images];[newImgs[idx],newImgs[ni]]=[newImgs[ni],newImgs[idx]];const now=new Date();newImgs.forEach((img,i)=>{img.createdAt=new Date(now.getTime()-i).toISOString();});setImages(newImgs);for(const img of newImgs){await dbUpdate(img);}showToast('تم تغيير الترتيب ✓','success');};

const handleFiles=async files=>{
if(!files||files.length===0)return;
const proms=Array.from(files).filter(f=>f.type.startsWith('image/')).map(file=>new Promise((res,rej)=>{const reader=new FileReader();reader.onload=async e=>{try{const d={id:uid(),galleryId:course.id,data:e.target.result,title:file.name.replace(/\.[^/.]+$/,""),description:'',createdAt:new Date().toISOString(),size:file.size,type:file.type};await dbAdd(d);res(d);}catch(err){rej(err);}};reader.onerror=()=>rej(reader.error);reader.readAsDataURL(file);}));
try{const added=await Promise.all(proms);setImages(prev=>[...added,...prev]);showToast(`تم رفع ${added.length} صورة ✓`,'success');}catch(e){showToast('خطأ في رفع بعض الصور','error');}
};

return(<div className="fade-in">

<div className="relative flex items-start justify-between gap-4">
<div className="flex items-center gap-4">
<div onClick={()=>coverRef.current?.click()} className="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center text-2xl overflow-hidden cursor-pointer hover:bg-white/30">{course.image?<img src={course.image} alt="" className="w-full h-full object-cover rounded-2xl"/>:<i className={`fa ${course.icon||'fa-images'}`}></i>}</div>
<div><h1 className="text-2xl font-bold">{course.title}</h1><p className="text-white/80 text-sm mt-1">{course.doc}</p><div className="flex gap-4 mt-2 text-sm text-white/70"><span><i className="fa fa-image ml-1"></i>{images.length} صورة</span></div></div>
</div>
<div className="flex items-center gap-2 flex-shrink-0">
<button onClick={()=>coverRef.current?.click()} className="w-9 h-9 bg-white/20 hover:bg-white/30 rounded-xl flex items-center justify-center"><i className="fa fa-image text-sm"></i></button>

</div>
</div>
</div>

<div className={`upload-zone mb-6 ${dragOver?'dragover':''}`} onDrop={e=>{e.preventDefault();setDragOver(false);handleFiles(e.dataTransfer.files);}} onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)} onClick={()=>fileRef.current?.click()}>
<input type="file" ref={fileRef} accept="image/*" multiple onChange={e=>handleFiles(e.target.files)} className="hidden"/>
<div className="text-indigo-500 mb-3"><i className="fa fa-cloud-upload-alt text-4xl"></i></div>
<p className="text-gray-700 dark:text-gray-300 font-semibold">اسحب الصور هنا أو اضغط للاختيار</p>

</div>

{images.length>0&&<div className="flex justify-end mb-4"><button onClick={()=>setClearAll(true)} className="flex items-center gap-2 px-4 py-2 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-xl hover:bg-red-200 text-sm font-medium"><i className="fa fa-trash"></i> حذف جميع الصور</button></div>}

{loading?<div className="text-center py-16"><div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div><p className="text-gray-400">جاري تحميل الصور...</p></div>
:images.length===0?<div className="text-center py-16 bg-white dark:bg-gray-800 rounded-2xl border border-dashed border-gray-300 dark:border-gray-600"><div className="w-20 h-20 bg-pink-50 dark:bg-pink-900/20 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl text-pink-300"><i className="fa fa-images"></i></div><p className="text-gray-400 font-medium">لا توجد صور في المعرض</p></div>
:<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:'0.75rem',width:'100%'}}>{images.map((img,imgIdx)=><div key={img.id} style={{position:'relative',width:'100%',paddingBottom:'100%',borderRadius:'1rem',overflow:'hidden',cursor:'pointer',transition:'all 0.3s'}} onClick={()=>setLightbox(img)} onMouseEnter={e=>{e.currentTarget.querySelector('.g-ov').style.opacity='1';e.currentTarget.style.transform='scale(1.02)';e.currentTarget.style.boxShadow='0 10px 40px rgba(0,0,0,0.2)';}} onMouseLeave={e=>{e.currentTarget.querySelector('.g-ov').style.opacity='0';e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='none';}}><img src={img.data} alt={img.title} loading="lazy" style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',objectFit:'cover',display:'block'}}/><div className="g-ov" style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',background:'linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 50%)',opacity:0,transition:'opacity 0.3s',zIndex:2}}><div style={{position:'absolute',bottom:0,left:0,right:0,padding:'0.75rem'}}><p style={{color:'#fff',fontWeight:600,fontSize:'0.875rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',margin:0}}>{img.title}</p>{img.description&&<p style={{color:'rgba(255,255,255,0.7)',fontSize:'0.75rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',margin:0}}>{img.description}</p>}</div><div style={{position:'absolute',top:'0.5rem',left:'0.5rem',display:'flex',gap:'0.25rem'}}><button onClick={e=>{e.stopPropagation();handleMoveImage(img.id,'up');}} disabled={imgIdx===0} style={{width:'28px',height:'28px',background:imgIdx===0?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.9)',borderRadius:'0.4rem',display:'flex',alignItems:'center',justifyContent:'center',border:'none',cursor:imgIdx===0?'not-allowed':'pointer',color:'#2563eb',fontSize:'0.65rem'}}><i className="fa fa-arrow-right"></i></button><button onClick={e=>{e.stopPropagation();handleMoveImage(img.id,'down');}} disabled={imgIdx===images.length-1} style={{width:'28px',height:'28px',background:imgIdx===images.length-1?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.9)',borderRadius:'0.4rem',display:'flex',alignItems:'center',justifyContent:'center',border:'none',cursor:imgIdx===images.length-1?'not-allowed':'pointer',color:'#2563eb',fontSize:'0.65rem'}}><i className="fa fa-arrow-left"></i></button><button onClick={e=>{e.stopPropagation();setEditImg(img);setEditImgTitle(img.title);setEditImgDesc(img.description||'');}} style={{width:'28px',height:'28px',background:'rgba(255,255,255,0.9)',borderRadius:'0.4rem',display:'flex',alignItems:'center',justifyContent:'center',border:'none',cursor:'pointer',color:'#4f46e5',fontSize:'0.65rem'}}><i className="fa fa-pen"></i></button><button onClick={e=>{e.stopPropagation();setDelImgId(img.id);}} style={{width:'28px',height:'28px',background:'rgba(255,255,255,0.9)',borderRadius:'0.4rem',display:'flex',alignItems:'center',justifyContent:'center',border:'none',cursor:'pointer',color:'#dc2626',fontSize:'0.65rem'}}><i className="fa fa-trash"></i></button></div></div></div>)}</div>}

{lightbox&&<div style={{position:'fixed',top:0,left:0,right:0,bottom:0,zIndex:99999,background:'rgba(0,0,0,0.95)',display:'flex',alignItems:'center',justifyContent:'center'}} onClick={()=>setLightbox(null)}><button style={{position:'absolute',top:'1rem',left:'1rem',width:'40px',height:'40px',background:'rgba(255,255,255,0.2)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',border:'none',cursor:'pointer',color:'#fff',fontSize:'1.25rem',zIndex:10}} onClick={()=>setLightbox(null)}><i className="fa fa-times"></i></button><div style={{position:'absolute',bottom:'1rem',left:'1rem',right:'1rem',textAlign:'center'}}><p style={{color:'#fff',fontWeight:600,margin:0}}>{lightbox.title}</p>{lightbox.description&&<p style={{color:'rgba(255,255,255,0.7)',fontSize:'0.875rem',margin:0}}>{lightbox.description}</p>}</div><img src={lightbox.data} alt={lightbox.title} style={{maxWidth:'90vw',maxHeight:'90vh',objectFit:'contain',borderRadius:'0.5rem'}} onClick={e=>e.stopPropagation()}/></div>}

<Modal isOpen={!!editImg} onClose={()=>setEditImg(null)} title="✏️ تعديل الصورة" size="sm"><div className="flex flex-col gap-4">{editImg&&<div className="w-full h-40 rounded-xl overflow-hidden bg-gray-100 dark:bg-gray-800"><img src={editImg.data} alt="" className="w-full h-full object-contain"/></div>}<div><label className="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">عنوان الصورة</label><input value={editImgTitle} onChange={e=>setEditImgTitle(e.target.value)} className="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none"/></div><div><label className="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">الوصف</label><textarea value={editImgDesc} onChange={e=>setEditImgDesc(e.target.value)} rows={3} className="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none resize-none"/></div><div className="flex gap-3 justify-end"><button onClick={()=>setEditImg(null)} className="px-4 py-2 rounded-xl border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 font-medium">إلغاء</button><button onClick={async()=>{if(!editImg)return;const u={...editImg,title:editImgTitle.trim(),description:editImgDesc.trim()};await dbUpdate(u);setImages(prev=>prev.map(i=>i.id===u.id?u:i));setEditImg(null);showToast('تم تعديل الصورة ✓','success');}} className="px-4 py-2 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-medium hover:opacity-90">حفظ</button></div></div></Modal>

<ConfirmModal isOpen={!!delImgId} onClose={()=>setDelImgId(null)} onConfirm={async()=>{await dbDel(delImgId);setImages(prev=>prev.filter(i=>i.id!==delImgId));setDelImgId(null);showToast('تم حذف الصورة ✓','success');}} title="🗑️ حذف الصورة" message="هل أنت متأكد؟" confirmText="نعم، احذف"/>
<ConfirmModal isOpen={clearAll} onClose={()=>setClearAll(false)} onConfirm={async()=>{await dbDelByGallery(course.id);setImages([]);setClearAll(false);showToast('تم حذف جميع الصور ✓','success');}} title="🗑️ حذف الكل" message="هل أنت متأكد من حذف جميع الصور؟" confirmText="نعم، احذف الكل"/>

<Modal isOpen={editModal} onClose={()=>setEditModal(false)} title="✏️ تعديل بيانات المعرض" size="sm"><div className="flex flex-col gap-4"><div><label className="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">اسم المعرض *</label><input value={editTitle} onChange={e=>setEditTitle(e.target.value)} autoFocus className="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none"/></div><div><label className="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">الوصف</label><input value={editDoc} onChange={e=>setEditDoc(e.target.value)} className="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none"/></div><div className="flex gap-3 justify-end mt-2"><button onClick={()=>setEditModal(false)} className="px-4 py-2 rounded-xl border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 font-medium">إلغاء</button><button onClick={()=>{if(!editTitle.trim()){showToast('الاسم مطلوب','error');return;}onUpdate({...course,title:editTitle.trim(),doc:editDoc.trim()});setEditModal(false);showToast('تم التحديث ✓','success');}} className="px-4 py-2 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-medium hover:opacity-90">حفظ</button></div></div></Modal>
</div>);}

// CourseDetail
function CourseDetail({course,onBack,onUpdate,showToast,darkMode}){
const[activeTab,setActiveTab]=useState('sections');
const[addSectionModal,setAddSectionModal]=useState(false);
const[addNoteModal,setAddNoteModal]=useState(false);
const[newNote,setNewNote]=useState('');
const[deleteSectionId,setDeleteSectionId]=useState(null);
const[editModal,setEditModal]=useState(false);
const[editTitle,setEditTitle]=useState(course.title);
const[editDoc,setEditDoc]=useState(course.doc);
const[editNoteModal,setEditNoteModal]=useState(null);
const[editNoteContent,setEditNoteContent]=useState('');
const fileRef=useRef(null);
const totalLinks=(course.sections||[]).reduce((a,s)=>a+(s.links||[]).length,0);

const handleUpdateSection=updated=>{
let ns=[...(course.sections||[])];
const idx=ns.findIndex(s=>s.id===updated.id);
if(idx===-1)return;
if(updated._move==='up'&&idx>0){[ns[idx],ns[idx-1]]=[ns[idx-1],ns[idx]];showToast('تم تحريك القسم ✓','info');}
else if(updated._move==='down'&&idx<ns.length-1){[ns[idx],ns[idx+1]]=[ns[idx+1],ns[idx]];showToast('تم تحريك القسم ✓','info');}
else if(updated._delete){setDeleteSectionId(updated.id);return;}
else{ns[idx]=updated;}
ns=ns.map(s=>{const{_move,_delete,...r}=s;return r;});
onUpdate({...course,sections:ns});
};

return(<div className="fade-in">
<button onClick={onBack} className="flex items-center gap-2 text-indigo-500 hover:text-indigo-700 font-medium mb-4 group"><i className="fa fa-arrow-right group-hover:translate-x-1 transition-transform"></i><span>العودة للرئيسية</span></button>
<div className={`bg-gradient-to-l ${course.color||'from-indigo-500 to-purple-600'} rounded-2xl p-6 text-white shadow-lg relative overflow-hidden mb-6`}>
<input type="file" ref={fileRef} accept="image/*" onChange={e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>{onUpdate({...course,image:ev.target.result});showToast('تم تغيير الصورة ✓','success');};r.readAsDataURL(f);}} className="hidden"/>
{course.image&&<div className="absolute inset-0 opacity-20 bg-cover bg-center" style={{backgroundImage:`url(${course.image})`}}></div>}
<div className="relative flex items-start justify-between gap-4">
<div className="flex items-center gap-4">
<div onClick={()=>fileRef.current?.click()} className="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center text-2xl overflow-hidden cursor-pointer hover:bg-white/30">{course.image?<img src={course.image} alt="" className="w-full h-full object-cover rounded-2xl"/>:<i className={`fa ${course.icon||'fa-book'}`}></i>}</div>
<div><h1 className="text-2xl font-bold">{course.title}</h1><p className="text-white/80 text-sm mt-1">{course.doc}</p><div className="flex gap-4 mt-2 text-sm text-white/70"><span><i className="fa fa-layer-group ml-1"></i>{(course.sections||[]).length} قسم</span><span><i className="fa fa-link ml-1"></i>{totalLinks} رابط</span><span><i className="fa fa-sticky-note ml-1"></i>{(course.notes||[]).length} ملاحظة</span></div></div>
</div>
<div className="flex items-center gap-2 flex-shrink-0"><button onClick={()=>fileRef.current?.click()} className="w-9 h-9 bg-white/20 hover:bg-white/30 rounded-xl flex items-center justify-center"><i className="fa fa-image text-sm"></i></button><button onClick={()=>{setEditTitle(course.title);setEditDoc(course.doc||'');setEditModal(true);}} className="w-9 h-9 bg-white/20 hover:bg-white/30 rounded-xl flex items-center justify-center"><i className="fa fa-pen text-sm"></i></button></div>
</div>
</div>

<div className="flex gap-2 mb-6">
<button onClick={()=>setActiveTab('sections')} className={`flex items-center gap-2 px-5 py-2.5 rounded-xl font-semibold text-sm ${activeTab==='sections'?'bg-gradient-to-r from-indigo-500 to-purple-600 text-white shadow-md':'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-700'}`}><i className="fa fa-layer-group"></i> الأقسام والروابط</button>
<button onClick={()=>setActiveTab('notes')} className={`flex items-center gap-2 px-5 py-2.5 rounded-xl font-semibold text-sm ${activeTab==='notes'?'bg-gradient-to-r from-amber-500 to-orange-600 text-white shadow-md':'bg-white dark:bg-gray-800 text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-gray-700'}`}><i className="fa fa-sticky-note"></i> الملاحظات ({course.notes?.length||0})</button>
</div>

{activeTab==='sections'&&<div>
<div className="flex items-center justify-between mb-4"><h2 className="text-lg font-bold text-gray-800 dark:text-white">📁 الأقسام</h2><button onClick={()=>setAddSectionModal(true)} className="flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl hover:opacity-90 font-medium text-sm shadow-md"><i className="fa fa-plus"></i> إضافة قسم</button></div>
{(course.sections||[]).length===0?<div className="text-center py-16 bg-white dark:bg-gray-800 rounded-2xl border border-dashed border-gray-300 dark:border-gray-600"><div className="w-20 h-20 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl text-gray-300"><i className="fa fa-folder-open"></i></div><p className="text-gray-400 font-medium">لا توجد أقسام بعد</p></div>
:course.sections.map((sec,idx)=><SectionItem key={sec.id} section={sec} sectionIndex={idx} totalSections={course.sections.length} onUpdate={handleUpdateSection} showToast={showToast}/>)}
</div>}

{activeTab==='notes'&&<div>
<div className="flex items-center justify-between mb-4"><h2 className="text-lg font-bold text-gray-800 dark:text-white">📝 الملاحظات</h2><button onClick={()=>{setNewNote('');setAddNoteModal(true);}} className="flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-amber-500 to-orange-600 text-white rounded-xl hover:opacity-90 font-medium text-sm shadow-md"><i className="fa fa-plus"></i> ملاحظة جديدة</button></div>
{(course.notes||[]).length===0?<div className="text-center py-16 bg-white dark:bg-gray-800 rounded-2xl border border-dashed border-gray-300 dark:border-gray-600"><div className="w-20 h-20 bg-amber-50 dark:bg-amber-900/20 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl text-amber-300"><i className="fa fa-sticky-note"></i></div><p className="text-gray-400 font-medium">لا توجد ملاحظات</p></div>
:<div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">{course.notes.map((n,i)=>{const ns=darkMode?NOTE_COLORS_DARK[i%NOTE_COLORS_DARK.length]:NOTE_COLORS_LIGHT[i%NOTE_COLORS_LIGHT.length];return <NoteCard key={n.id} note={n} noteStyle={ns} onDelete={id=>{onUpdate({...course,notes:course.notes.filter(x=>x.id!==id)});showToast('تم حذف الملاحظة ✓','success');}} onStartEdit={n=>{setEditNoteModal(n);setEditNoteContent(n.content);}}/>;})}</div>}
</div>}

<Modal isOpen={!!editNoteModal} onClose={()=>setEditNoteModal(null)} title="📝 تعديل الملاحظة" size="sm"><textarea value={editNoteContent} onChange={e=>setEditNoteContent(e.target.value)} rows={5} autoFocus className="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none resize-none"/><div className="flex gap-3 justify-end mt-4"><button onClick={()=>setEditNoteModal(null)} className="px-4 py-2 rounded-xl border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 font-medium">إلغاء</button><button onClick={()=>{if(editNoteContent.trim()&&editNoteModal){onUpdate({...course,notes:course.notes.map(x=>x.id===editNoteModal.id?{...x,content:editNoteContent.trim(),updatedAt:new Date().toISOString()}:x)});setEditNoteModal(null);showToast('تم تعديل الملاحظة ✓','success');}}} className="px-4 py-2 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-medium hover:opacity-90">حفظ</button></div></Modal>

<InputModal isOpen={addSectionModal} onClose={()=>setAddSectionModal(false)} onConfirm={name=>{onUpdate({...course,sections:[...(course.sections||[]),{id:uid(),name,badge:'مضاف',links:[]}]});showToast(`تم إضافة قسم "${name}" ✓`,'success');}} title="📂 إضافة قسم جديد" label="اسم القسم *" placeholder="مثال: محاضرات..."/>
<Modal isOpen={addNoteModal} onClose={()=>setAddNoteModal(false)} title="📝 إضافة ملاحظة" size="sm"><textarea value={newNote} onChange={e=>setNewNote(e.target.value)} rows={5} autoFocus className="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 text-gray-800 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none resize-none"/><div className="flex gap-3 justify-end mt-4"><button onClick={()=>setAddNoteModal(false)} className="px-4 py-2 rounded-xl border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 font-medium">إلغاء</button><button onClick={()=>{if(!newNote.trim()){showToast('اكتب الملاحظة','error');return;}onUpdate({...course,notes:[...(course.notes||[]),{id:Date.now(),content:newNote.trim(),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()}]});setNewNote('');setAddNoteModal(false);showToast('تم إضافة الملاحظة ✓','success');}} className="px-4 py-2 rounded-xl bg-gradient-to-r from-amber-500 to-orange-600 text-white font-medium hover:opacity-90">إضافة</button></div></Modal>
<ConfirmModal isOpen={!!deleteSectionId} onClose={()=>setDeleteSectionId(null)} onConfirm={()=>{onUpdate({...course,sections:course.sections.filter(s=>s.id!==deleteSectionId)});setDeleteSectionId(null);showToast('تم حذف القسم ✓','success');}} title="🗑️ حذف القسم" message="هل أنت متأكد؟" confirmText="نعم، احذف"/>

return(<div className="card-hover cursor-pointer group relative rounded-2xl overflow-hidden border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 shadow-sm hover:shadow-xl" onClick={onClick}>

</div>
</div>);}

<div><label className="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">اللون</label><div className="grid grid-cols-5 gap-2">{COURSE_COLORS.map(c=><button key={c} onClick={()=>setColor(c)} className={`h-8 rounded-xl bg-gradient-to-r ${c} ${color===c?'ring-2 ring-indigo-500 ring-offset-2 scale-110':'hover:scale-105'}`}></button>)}</div></div>
<div className="flex gap-3 justify-end mt-2 pt-2 border-t border-gray-100 dark:border-gray-700"><button onClick={onClose} className="px-4 py-2 rounded-xl border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 font-medium">إلغاء</button><button onClick={()=>{if(!title.trim())return;onAdd({id:uid(),title:title.trim(),doc:doc.trim(),icon,color,image,type:mode,sections:[],notes:[]});onClose();}} disabled={!title.trim()} className="px-6 py-2 rounded-xl bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-medium hover:opacity-90 disabled:opacity-50 disabled:cursor-not-allowed">➕ إضافة</button></div>
</div></Modal>);}

// HomeView
function HomeView({courses,onSelectCourse,onDeleteCourse,onAddCourse,onMoveCourse,showToast}){
const[search,setSearch]=useState('');
const[addModal,setAddModal]=useState(false);
const[deleteId,setDeleteId]=useState(null);
const filtered=courses.filter(c=>c.title.toLowerCase().includes(search.toLowerCase())||(c.doc||'').toLowerCase().includes(search.toLowerCase()));

return(<div className="fade-in">
<div className="flex flex-col sm:flex-row gap-3 mb-8"><div className="relative flex-1"><i className="fa fa-search absolute top-1/2 -translate-y-1/2 right-4 text-gray-400 text-sm"></i><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 ابحث عن مقرر أو معرض..." className="w-full pr-11 pl-4 py-3 rounded-2xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 text-gray-800 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm"/></div><button onClick={()=>setAddModal(true)} className="flex items-center gap-2 px-5 py-3 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-2xl hover:opacity-90 shadow-md font-semibold whitespace-nowrap"><i className="fa fa-plus"></i> إضافة جديد</button></div>
<div className="grid grid-cols-3 gap-3 mb-8">{[{label:'المقررات',value:courses.filter(c=>c.type!=='gallery').length,icon:'fa-book',color:'from-indigo-500 to-purple-600'},{label:'المعارض',value:courses.filter(c=>c.type==='gallery').length,icon:'fa-images',color:'from-pink-500 to-rose-600'},{label:'الروابط',value:courses.reduce((a,c)=>a+(c.sections||[]).reduce((b,s)=>b+(s.links||[]).length,0),0),icon:'fa-link',color:'from-emerald-500 to-teal-600'}].map(s=><div key={s.label} className="bg-white dark:bg-gray-800 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-700"><div className={`w-9 h-9 bg-gradient-to-br ${s.color} rounded-xl flex items-center justify-center text-white mb-2`}><i className={`fa ${s.icon} text-sm`}></i></div><div className="text-2xl font-bold text-gray-800 dark:text-white">{s.value}</div><div className="text-xs text-gray-500 dark:text-gray-400 font-medium">{s.label}</div></div>)}</div>
{filtered.length===0?<div className="text-center py-20"><div className="w-24 h-24 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl text-gray-300"><i className={search?'fa fa-search':'fa fa-graduation-cap'}></i></div><p className="text-gray-400 font-semibold text-lg">{search?'❌ لا توجد نتائج':'📚 لا توجد مقررات'}</p></div>
:<div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">{filtered.map(course=>{const ri=courses.findIndex(c=>c.id===course.id);return<CourseCard key={course.id} course={course} index={ri} totalCourses={courses.length} onClick={()=>onSelectCourse(course.id)} onDelete={id=>setDeleteId(id)} onMoveUp={()=>onMoveCourse(ri,'up')} onMoveDown={()=>onMoveCourse(ri,'down')}/>;})}</div>}
<AddModal isOpen={addModal} onClose={()=>setAddModal(false)} onAdd={c=>{onAddCourse(c);showToast(`تم إضافة "${c.title}" ✓`,'success');}}/>
<ConfirmModal isOpen={!!deleteId} onClose={()=>setDeleteId(null)} onConfirm={()=>{onDeleteCourse(deleteId);setDeleteId(null);showToast('تم الحذف ✓','success');}} title="🗑️ حذف" message="هل أنت متأكد من الحذف؟ لا يمكن التراجع!" confirmText="نعم، احذف"/>
</div>);}

// Export
async function exportSnapshot(courses,darkMode){
let allImages=[];
try{allImages=await dbGetAllExport();}catch(e){console.error(e);}
const SE='<'+'/'+'script>';
const STE='<'+'/'+'style>';
const cssText=document.querySelector('style:not([type])').textContent;
const jsCode=document.querySelector('script[type="text/babel"]').textContent;
const parts=[];
parts.push('<!DOCTYPE html>\n<html lang="ar" dir="rtl">\n<head>\n<meta charset="UTF-8" />\n<meta name="viewport" content="width=device-width, initial-scale=1.0" />\n<title>مكتبة مواد اعدادي هندسة</title>');
parts.push('<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />');
parts.push('<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />');
parts.push('<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">'+SE);
parts.push('<style type="text/tailwindcss">@custom-variant dark (&:where(.dark, .dark *));'+STE);
parts.push('<script src="https://unpkg.com/react@18/umd/react.development.js">'+SE);
parts.push('<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js">'+SE);
parts.push('<script src="https://unpkg.com/@babel/standalone/babel.min.js">'+SE);
parts.push('<style>'+cssText+STE);
parts.push('<script>');
parts.push('window.__SNAPSHOT_DATA__='+JSON.stringify(courses)+';');
parts.push('window.__SNAPSHOT_IMAGES__='+JSON.stringify(allImages)+';');
parts.push('window.__SNAPSHOT_DARK__='+darkMode+';');
parts.push('window.__HIDE_EXPORT__=true;');
parts.push(SE);
parts.push('</head>\n<body>\n<div id="root"></div>');
parts.push('<script type="text/babel">'+jsCode+SE);
parts.push('</body>\n</html>');
const blob=new Blob([parts.join('\n')],{type:'text/html;charset=utf-8'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;a.download='library-'+new Date().toISOString().slice(0,10)+'.html';
document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// MAIN APP
function App(){
const[courses,setCourses]=useState(()=>{
if(window.__SNAPSHOT_DATA__){
const d=window.__SNAPSHOT_DATA__;
if(window.__SNAPSHOT_IMAGES__&&window.__SNAPSHOT_IMAGES__.length>0){
(async()=>{try{for(const img of window.__SNAPSHOT_IMAGES__)await dbAdd(img).catch(()=>{});}catch(e){}})();
}
saveData(d);window.__SNAPSHOT_DATA__=null;window.__SNAPSHOT_IMAGES__=null;return d;
}
return loadData();
});
const[selectedCourseId,setSelectedCourseId]=useState(null);
const[darkMode,setDarkMode]=useState(()=>{
if(window.__SNAPSHOT_DARK__!==undefined){const v=window.__SNAPSHOT_DARK__;window.__SNAPSHOT_DARK__=null;return v;}
try{return localStorage.getItem('darkMode_v2')==='true';}catch(e){return false;}
});
const[toasts,setToasts]=useState([]);
const hideExport=window.__HIDE_EXPORT__===true;

useEffect(()=>{const h=window.location.hash.slice(1);if(h&&courses.find(c=>c.id===h))setSelectedCourseId(h);},[]);
useEffect(()=>{if(selectedCourseId)window.location.hash=selectedCourseId;else if(window.location.hash)history.pushState('',document.title,window.location.pathname+window.location.search);},[selectedCourseId]);
useEffect(()=>{const fn=()=>{const h=window.location.hash.slice(1);if(h&&courses.find(c=>c.id===h))setSelectedCourseId(h);else setSelectedCourseId(null);};window.addEventListener('hashchange',fn);return()=>window.removeEventListener('hashchange',fn);},[courses]);
useEffect(()=>{saveData(courses);},[courses]);
useEffect(()=>{try{localStorage.setItem('darkMode_v2',darkMode);}catch(e){}if(darkMode)document.documentElement.classList.add('dark');else document.documentElement.classList.remove('dark');},[darkMode]);

const showToast=useCallback((message,type='info')=>{const id=Date.now()+Math.random();setToasts(t=>[...t,{id,message,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);},[]);
const removeToast=useCallback(id=>{setToasts(t=>t.filter(x=>x.id!==id));},[]);
const selectedCourse=courses.find(c=>c.id===selectedCourseId);
const handleMoveCourse=(idx,dir)=>{const arr=[...courses];const ni=dir==='up'?idx-1:idx+1;if(ni<0||ni>=arr.length)return;[arr[idx],arr[ni]]=[arr[ni],arr[idx]];setCourses(arr);showToast(`تم تحريك ${dir==='up'?'لأعلى':'لأسفل'} ✓`,'info');};

return(<div className={`min-h-screen flex flex-col transition-colors duration-300 ${darkMode?'dark bg-gray-950':'bg-gray-50'} dot-pattern`}>
<header className="sticky top-0 z-50 glass border-b border-gray-200 dark:border-gray-800 bg-white/80 dark:bg-gray-900/80">
<div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
<div className="flex items-center gap-3">
{selectedCourse&&<button onClick={()=>setSelectedCourseId(null)} className="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500 dark:text-gray-400"><i className="fa fa-arrow-right"></i></button>}
<div className="flex items-center gap-2"><div className="w-9 h-9 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center text-white"><i className="fa fa-graduation-cap text-sm"></i></div><div><h1 className="text-base font-bold text-gray-800 dark:text-white leading-tight">{selectedCourse?selectedCourse.title:'مكتبة مواد اعدادي هندسة'}</h1>{!selectedCourse&&<p className="text-xs text-gray-400 dark:text-gray-500 hidden sm:block">نظام إدارة المقررات والروابط الدراسية</p>}</div></div>
</div>
<div className="flex items-center gap-2">
{!hideExport&&<button onClick={async()=>{try{await exportSnapshot(courses,darkMode);showToast('تم تصدير النسخة ✓','success');}catch(e){showToast('خطأ في التصدير','error');}}} className="flex items-center gap-2 px-3 py-2 bg-gradient-to-r from-cyan-500 to-blue-600 text-white rounded-xl hover:opacity-90 text-sm font-semibold shadow-md"><i className="fa fa-download"></i><span className="hidden sm:inline">تصدير نسخة</span></button>}
<button onClick={()=>setDarkMode(!darkMode)} className="w-9 h-9 flex items-center justify-center rounded-xl bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-yellow-400 hover:bg-gray-200 dark:hover:bg-gray-700"><i className={`fa ${darkMode?'fa-sun':'fa-moon'}`}></i></button>
</div>
</div>
</header>
<main className="flex-1 max-w-7xl w-full mx-auto px-4 py-8">
{selectedCourse?(selectedCourse.type==='gallery'?<GalleryDetail course={selectedCourse} onBack={()=>setSelectedCourseId(null)} onUpdate={u=>setCourses(p=>p.map(c=>c.id===u.id?u:c))} showToast={showToast}/>:<CourseDetail course={selectedCourse} onBack={()=>setSelectedCourseId(null)} onUpdate={u=>setCourses(p=>p.map(c=>c.id===u.id?u:c))} showToast={showToast} darkMode={darkMode}/>):<HomeView courses={courses} onSelectCourse={setSelectedCourseId} onDeleteCourse={id=>{const c=courses.find(x=>x.id===id);if(c&&c.type==='gallery')dbDelByGallery(id).catch(()=>{});setCourses(p=>p.filter(x=>x.id!==id));}} onAddCourse={c=>setCourses(p=>[...p,c])} onMoveCourse={handleMoveCourse} showToast={showToast}/>}
</main>
<footer className="mt-auto text-center py-4 text-xs text-gray-400 dark:text-gray-600 border-t border-gray-100 dark:border-gray-800 bg-white/50 dark:bg-gray-900/50 glass"><span>made by abdallah elmohammady</span></footer>
<ToastContainer toasts={toasts} removeToast={removeToast}/>
</div>);}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
